<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>ScrollShot</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      p {
        font-size: 12px;
        color: #94a3b8;
        margin: 0 0 14px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        background: #1e3a8a;
        cursor: wait;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #94a3b8;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>ScrollShot</h1>
    <p>Captura la página completa y ábrela en el editor.</p>
    <button id="capture-btn">Capturar página completa</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
